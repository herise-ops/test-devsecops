name: SonarQube Analysis

on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened]


permissions:
  security-events: write  # Allows SARIF upload to the Security tab
  contents: read

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Fetches SonarCloud results via API and generates sonar.sarif
      - name: Generate SARIF from Sonar
        uses: vmvarela/sonarqube-sarif@v1
        if: always()
        with:
          sonar-host-url: ${{ secrets.SONAR_HOST_URL }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          project-key: herise-ops_test-devsecops
          output-file: sonar.sarif

      - name: Upload SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sonar.sarif
